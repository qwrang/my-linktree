<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>mayxinh — お Ꞌꞌ リンク ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #B8960C;
      --gold2: #FFD700;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #03070f;
      display: flex;
      justify-content: center;
      padding: 40px 16px 80px;
      overflow-x: hidden;
      position: relative;
      cursor: pointer;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      display: block;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-section {
      position: relative;
      margin-bottom: 20px;
      margin-top: 10px;
    }
    .avatar-wrap {
      position: relative;
      animation: floatAvatar 5s ease-in-out infinite;
    }
    @keyframes floatAvatar {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .avatar-glow-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #B8960C, #FFD700, #FDE16D, #B8960C);
      animation: spinGlow 3.5s linear infinite;
      filter: blur(3px);
      z-index: 1;
    }
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: linear-gradient(145deg, #0f1e2f, #030b14);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 3;
      border: 2px solid rgba(184,150,12,0.6);
      overflow: hidden;
      cursor: default;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-ring-outer {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px dashed rgba(184,150,12,0.3);
      animation: spinRing 22s linear infinite reverse;
      z-index: 0;
    }
    .avatar-ring-inner {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,215,0,0.2);
      animation: spinRing 12s linear infinite;
      z-index: 0;
    }
    @keyframes spinGlow { to { transform: rotate(360deg); } }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    .username {
      font-size: 1.55rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFE79A, #C9A21E, #F5C842);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    .bio {
      font-size: 0.85rem;
      color: rgba(240, 240, 255, 0.7);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
      min-height: 2.8rem;
    }
    .bio-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold2);
      margin-left: 3px;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    .icons-row {
      display: flex;
      gap: 20px;
      margin-bottom: 36px;
      justify-content: center;
    }
    .icon-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(20, 30, 45, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(184,150,12,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff9ea;
      text-decoration: none;
      transition: all 0.25s;
    }
    .icon-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .icon-btn:hover {
      background: rgba(184,150,12,0.45);
      transform: translateY(-5px) scale(1.1);
      color: #FFDF8C;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0 18px 0 8px;
      height: 70px;
      background: rgba(12, 22, 35, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(184,150,12,0.3);
      border-radius: 28px;
      text-decoration: none;
      color: white;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.2s;
      opacity: 0;
      animation: slideUp 0.5s ease forwards;
    }
    .link-btn:nth-child(1) { animation-delay: 0.1s; }
    .link-btn:nth-child(2) { animation-delay: 0.22s; }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(30px); }
      to { opacity:1; transform: translateY(0); }
    }
    .link-btn:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 215, 0, 0.8);
      background: rgba(30, 45, 65, 0.85);
    }
    .link-icon {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
    }
    .link-icon.tiktok { background: #000000; }
    .link-icon.fb { background: #1877F2; }
    .link-label {
      flex: 1;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
      color: #fef3cf;
    }
    .link-arrow {
      position: absolute;
      right: 20px;
      color: #dbb42c;
      transition: transform 0.2s;
    }
    .link-btn:hover .link-arrow {
      transform: translate(4px, -3px);
    }

    .footer {
      margin-top: 52px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(255,245,200,0.2);
    }

    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(184,150,12,0.6);
      color: #FFE9A7;
      font-size: 0.8rem;
      padding: 8px 22px;
      border-radius: 60px;
      transition: transform 0.35s;
      opacity: 0;
      z-index: 300;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: radial-gradient(circle, rgba(255,215,0,0.4), transparent);
      animation: rippleAnim 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(5); opacity: 0; }
    }

    .click-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.5);
      z-index: 50;
      white-space: nowrap;
      animation: fadeOutHint 4s ease forwards;
      pointer-events: none;
      font-weight: 500;
    }
    @keyframes fadeOutHint {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<audio id="bg-music" loop preload="auto"></audio>

<div id="toast">✨ Chào bạn yêu ✨</div>
<div class="click-hint">🎵 Click vào màn hình để nghe nhạc</div>

<div class="container">
  <div class="avatar-section">
    <div class="avatar-wrap">
      <div class="avatar-ring-outer"></div>
      <div class="avatar-ring-inner"></div>
      <div class="avatar-glow-ring"></div>
      <div class="avatar" id="avatar">
        <!-- 
          THAY ĐỔI ẢNH TẠI ĐÂY:
        -->
        <img id="avatarImg" src="https://files.catbox.moe/2qq7js.jpg" alt="avatar" style="display: block;">
      </div>
    </div>
  </div>

  <p class="username">お Ꞌꞌ mayxinh ꗯ ꩜</p>
  <div class="bio"><span id="bio-text"></span><span class="bio-cursor"></span></div>

  <div class="icons-row">
    <a class="icon-btn" href="https://www.tiktok.com/@mihnn_ahn0" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.28 6.28 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>
    </a>
    <a class="icon-btn" href="https://www.facebook.com/vuonghan.thiennguyet.4" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg>
    </a>
  </div>

  <div class="links">
    <a class="link-btn" href="https://www.tiktok.com/@mihnn_ahn0" target="_blank">
      <div class="link-icon tiktok"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.28 6.28 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg></div>
      <span class="link-label">TikTok • @mihnn_ahn0</span>
      <span class="link-arrow">↗</span>
    </a>
    <a class="link-btn" href="https://www.facebook.com/vuonghan.thiennguyet.4" target="_blank">
      <div class="link-icon fb"><svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg></div>
      <span class="link-label">Facebook • お Ꞌꞌ mayxinh ꗯ ꩜</span>
      <span class="link-arrow">↗</span>
    </a>
  </div>
  <p class="footer">✨ mayxinh ✨</p>
</div>

<script>
  (function() {
    // Toast thông báo (chỉ dùng cho nhạc)
    function showToast(msg, duration = 2500) {
      const toastEl = document.getElementById('toast');
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), duration);
    }
    
    // ========== NHẠC NỀN ==========
    const musicUrls = ["https://files.catbox.moe/smvrwk.mp3"];
    let currentUrlIndex = 0;
    const audio = document.getElementById('bg-music');
    let musicStarted = false;
    
    function tryNextMusicUrl() {
      if (currentUrlIndex >= musicUrls.length - 1) return false;
      currentUrlIndex++;
      audio.src = musicUrls[currentUrlIndex];
      audio.load();
      return true;
    }
    
    audio.addEventListener('error', () => {
      if (tryNextMusicUrl()) {
        audio.play().catch(() => {});
      }
    });
    
    function startMusicOnClick() {
      if (musicStarted) return;
      
      audio.play().then(() => {
        musicStarted = true;
        showToast('🎵 Nhạc đang phát...', 2000);
        document.removeEventListener('click', startMusicOnClick);
        document.removeEventListener('touchstart', startMusicOnClick);
      }).catch(() => {
        audio.load();
        setTimeout(() => {
          audio.play().then(() => {
            musicStarted = true;
            showToast('🎵 Nhạc đang phát...', 2000);
            document.removeEventListener('click', startMusicOnClick);
            document.removeEventListener('touchstart', startMusicOnClick);
          }).catch(() => {});
        }, 500);
      });
    }
    
    document.body.addEventListener('click', startMusicOnClick);
    document.body.addEventListener('touchstart', startMusicOnClick);
    
    audio.volume = 0.35;
    audio.loop = true;
    audio.src = musicUrls[0];
    audio.load();
    
    // ========== BACKGROUND CANVAS (SAO, SAO BĂNG) ==========
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    function setSize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    setSize();
    window.addEventListener('resize', setSize);
    
    const stars = [];
    for (let i = 0; i < 220; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: 0.7 + Math.random() * 1.7,
        gold: Math.random() > 0.7,
        vx: (Math.random() - 0.5) * 0.2,
        vy: (Math.random() - 0.5) * 0.12,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.008 + Math.random() * 0.025
      });
    }
    
    let meteors = [];
    function spawnMeteor() {
      meteors.push({
        x: Math.random() * w * 1.2 - w * 0.2,
        y: -20 - Math.random() * 40,
        len: 70 + Math.random() * 120,
        vx: 3.2 + Math.random() * 7,
        vy: 4.5 + Math.random() * 6,
        alpha: 0.9,
      });
    }
    setInterval(spawnMeteor, 2100);
    
    const auroras = [
      { cx: 0.2, cy: 0.2, rx: 0.45, ry: 0.32, color: 'rgba(184,150,12,', off: 0, speed: 0.0038 },
      { cx: 0.78, cy: 0.68, rx: 0.42, ry: 0.36, color: 'rgba(50, 90, 150,', off: 2.4, speed: 0.0042 },
      { cx: 0.48, cy: 0.85, rx: 0.58, ry: 0.42, color: 'rgba(120, 40, 140,', off: 3.9, speed: 0.0053 }
    ];
    let frame = 0;
    
    function drawBg() {
      if (!ctx) return;
      ctx.clearRect(0, 0, w, h);
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#030a14');
      grad.addColorStop(1, '#0a1828');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      
      auroras.forEach(a => {
        const pulse = 0.1 + 0.06 * Math.sin(frame * a.speed + a.off);
        const grd = ctx.createRadialGradient(a.cx * w, a.cy * h, 10, a.cx * w, a.cy * h, Math.max(w, h) * a.rx * 0.68);
        grd.addColorStop(0, a.color + pulse + ')');
        grd.addColorStop(0.9, a.color + '0.02)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);
      });
      
      stars.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -20) s.x = w + 15;
        if (s.x > w + 20) s.x = -15;
        if (s.y < -20) s.y = h + 15;
        if (s.y > h + 20) s.y = -15;
        const twinkleVal = 0.35 + 0.55 * Math.sin(frame * s.twinkleSpeed + s.twinkle);
        const alpha = Math.min(0.85, Math.max(0.2, twinkleVal));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.gold ? `rgba(255, 210, 80, ${alpha * 0.95})` : `rgba(255, 245, 210, ${alpha * 0.55})`;
        ctx.fill();
      });
      
      for (let i = 0; i < meteors.length; i++) {
        const m = meteors[i];
        m.x += m.vx;
        m.y += m.vy;
        m.alpha -= 0.013;
        if (m.alpha <= 0 || m.y > h + 120 || m.x > w + 200) {
          meteors.splice(i, 1);
          i--;
          continue;
        }
        const gradMeteor = ctx.createLinearGradient(m.x, m.y, m.x - m.len * 0.55, m.y - m.len);
        gradMeteor.addColorStop(0, `rgba(255, 220, 100, ${m.alpha * 0.9})`);
        gradMeteor.addColorStop(1, `rgba(184,150,12,0)`);
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.len * 0.58, m.y - m.len);
        ctx.strokeStyle = gradMeteor;
        ctx.lineWidth = 1.9;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(m.x, m.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,215,0,${m.alpha * 0.7})`;
        ctx.fill();
      }
      frame++;
      requestAnimationFrame(drawBg);
    }
    drawBg();
    
    // ========== TYPING BIO ==========
    const bioMessages = [
      "✨ Chào mừng đã đến thế giới của tớ ✨",
      "😍 Hãy cho tớ 1 follow nhá 😍",
      "🌟 Cùng nhau phát triển mỗi ngày 🌟",
      "💖 Cảm ơn bạn đã ghé thăm 💖"
    ];
    const bioSpan = document.getElementById('bio-text');
    let msgIndex = 0, charIndex = 0, isDeleting = false;
    function typeEffect() {
      const currentMsg = bioMessages[msgIndex];
      if (!isDeleting && charIndex <= currentMsg.length) {
        bioSpan.textContent = currentMsg.substring(0, charIndex);
        charIndex++;
        if (charIndex > currentMsg.length) {
          isDeleting = true;
          setTimeout(typeEffect, 2000);
          return;
        }
        setTimeout(typeEffect, 68);
      } else if (isDeleting && charIndex >= 0) {
        bioSpan.textContent = currentMsg.substring(0, charIndex);
        charIndex--;
        if (charIndex < 0) {
          isDeleting = false;
          msgIndex = (msgIndex + 1) % bioMessages.length;
          setTimeout(typeEffect, 160);
          return;
        }
        setTimeout(typeEffect, 38);
      } else {
        setTimeout(typeEffect, 45);
      }
    }
    setTimeout(typeEffect, 500);
    
    // Ripple effect cho link
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const left = e.clientX - rect.left - size / 2;
        const top = e.clientY - rect.top - size / 2;
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${left}px;top:${top}px;position:absolute;border-radius:50%;pointer-events:none;`;
        this.style.position = 'relative';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      });
    });
  })();
</script>
</body>
</html>
